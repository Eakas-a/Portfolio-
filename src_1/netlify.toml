[build]
  # Adjust to match your actual Angular build output.
  # e.g. "dist/portfolio" or "dist/portfolio/browser" depending on your
  # Angular version — check what `ng build` produces locally.
  publish = "dist/portfolio/browser"
  command = "npm run build"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
